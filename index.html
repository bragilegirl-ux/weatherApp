
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Weather App</title>

  <link rel="stylesheet" href="style.css">

  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>

<body>

<div class="weather-app">

  <header>
    <form id="search-form">
      <input
        type="search"
        placeholder="Enter a city..."
        required
        id="search-input"
      />

      <input type="submit" value="Search" />
    </form>
  </header>

  <main>
    <div class="weather-app-data">

      <div>
        <h1 id="current-city">London</h1>

        <p>
          <span id="current-date"></span>,
          <span id="description"></span>

          <br />

          Humidity:
          <strong id="humidity"></strong>

          ,
          Wind:
          <strong id="wind"></strong>
        </p>
      </div>

      <div class="weather-app-temperature-container">

        <img id="icon" src="" alt="Weather Icon" width="80" />

        <div id="temperature">12</div>

        <div>°C</div>

      </div>

    </div>
  </main>

  <footer>
    <p>
      This project was coded by
          <a href="#" target="_blank">Oladipo Abiodun Mariam</a> and is
          <a href="https://github.com/bragilegirl-ux/weatherApp" target="_blank"> on GitHub</a> and
          <a href="https://myshecodeweatherapp.netlify.app/"_blank">hosted on Netlify</a>
    </p>
  </footer>

</div>

<script src="index.js"></script>

</body>
</html>
